frr version 8.1
frr defaults traditional
hostname frr-fw
!
interface eth1
 description TO_WAN_EDGE
 ip address 172.16.0.2/31
!
interface eth2
 description DMZ_SERVER_NET_1
 ip address 172.16.102.1/24
!
interface eth3
 description DMZ_SERVER_NET_2
 ip address 172.16.103.1/24
!
router bgp 65000
 neighbor 172.16.0.3 remote-as 65000
 !
 address-family ipv4 unicast
  network 172.16.102.0/24
  network 172.16.103.0/24
 exit-address-family
!
ip route 0.0.0.0/0 172.16.0.3