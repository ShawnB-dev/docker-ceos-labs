!
hostname ceos-1
!
vlan 10
   name USERS
!
vlan 20
   name TOOLS
!
interface Management1
   ip address 10.99.0.11/24
!
interface Ethernet1
   description host-a
   switchport access vlan 10
!
interface Ethernet2
   description host-b
   switchport access vlan 10
!
interface Ethernet3
   description rust-toolkit
   switchport access vlan 20
!
interface Vlan10
   ip address 192.168.10.1/24
!
interface Vlan20
   ip address 192.168.20.1/24
!
ip routing
!
management api http-commands
   protocol https
   no shutdown
!
end