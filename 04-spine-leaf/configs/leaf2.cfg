!
hostname leaf2
!
interface Loopback0
   ip address 10.255.1.2/32
!
interface Management1
   ip address 10.99.0.22/24
!
interface Ethernet1
   description TO-SPINE1
   no switchport
   ip address 10.0.2.1/31
!
interface Ethernet2
   description TO-SPINE2
   no switchport
   ip address 10.0.2.3/31
!
ip routing
!
router ospf 1
   router-id 10.255.1.2
   passive-interface Loopback0
   network 10.0.2.0/31 area 0
   network 10.0.2.2/31 area 0
   network 10.255.1.2/32 area 0
!
management api http-commands
   protocol https
   no shutdown
!
end