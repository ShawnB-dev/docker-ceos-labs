!
hostname spine1
!
interface Loopback0
   ip address 10.255.0.1/32
!
interface Management1
   ip address 10.99.0.11/24
!
interface Ethernet1
   description TO-LEAF1
   no switchport
   ip address 10.0.1.0/31
!
interface Ethernet2
   description TO-LEAF2
   no switchport
   ip address 10.0.2.0/31
!
interface Ethernet3
   description TO-LEAF3
   no switchport
   ip address 10.0.3.0/31
!
interface Ethernet4
   description TO-LEAF4
   no switchport
   ip address 10.0.4.0/31
!
ip routing
!
router ospf 1
   router-id 10.255.0.1
   passive-interface Loopback0
   network 10.0.1.0/31 area 0
   network 10.0.2.0/31 area 0
   network 10.0.3.0/31 area 0
   network 10.0.4.0/31 area 0
   network 10.255.0.1/32 area 0
!
management api http-commands
   protocol https
   no shutdown
!
end