!
hostname edge
!
interface Loopback0
   ip address 203.0.113.1/32
!
interface Management1
   ip address 10.99.0.14/24
!
interface Ethernet1
   description TO-CEOS-1
   no switchport
   ip address 10.0.14.2/30
!
ip routing
!
router bgp 65001
   router-id 203.0.113.1
   neighbor 10.0.14.1 remote-as 65000
   neighbor 10.0.14.1 description eBGP-TO-CEOS-1
   network 203.0.113.0/24
!
management api http-commands
   protocol https
   no shutdown
!
end