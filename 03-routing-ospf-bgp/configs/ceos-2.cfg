!
hostname ceos-2
!
interface Loopback0
   ip address 2.2.2.2/32
!
interface Management1
   ip address 10.99.0.12/24
!
interface Ethernet1
   description TO-CEOS-1
   no switchport
   ip address 10.0.12.2/30
!
interface Ethernet2
   description TO-CEOS-3
   no switchport
   ip address 10.0.23.1/30
!
ip routing
!
router ospf 1
   router-id 2.2.2.2
   network 2.2.2.2/32 area 0
   network 10.0.12.0/30 area 0
   network 10.0.23.0/30 area 0
!
router bgp 65000
   router-id 2.2.2.2
   neighbor 1.1.1.1 remote-as 65000
   neighbor 1.1.1.1 update-source Loopback0
   neighbor 1.1.1.1 description iBGP-TO-CEOS-1
   neighbor 3.3.3.3 remote-as 65000
   neighbor 3.3.3.3 update-source Loopback0
   neighbor 3.3.3.3 description iBGP-TO-CEOS-3
!
management api http-commands
   protocol https
   no shutdown
!
end