!
hostname ceos-1
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Management1
   ip address 10.99.0.11/24
!
interface Ethernet1
   description TO-CEOS-2
   no switchport
   ip address 10.0.12.1/30
!
interface Ethernet2
   description TO-CEOS-3
   no switchport
   ip address 10.0.31.2/30
!
interface Ethernet3
   description TO-EDGE
   no switchport
   ip address 10.0.14.1/30
!
ip routing
!
router ospf 1
   router-id 1.1.1.1
   network 1.1.1.1/32 area 0
   network 10.0.12.0/30 area 0
   network 10.0.31.0/30 area 0
!
router bgp 65000
   router-id 1.1.1.1
   neighbor 2.2.2.2 remote-as 65000
   neighbor 2.2.2.2 update-source Loopback0
   neighbor 2.2.2.2 description iBGP-TO-CEOS-2
   neighbor 3.3.3.3 remote-as 65000
   neighbor 3.3.3.3 update-source Loopback0
   neighbor 3.3.3.3 description iBGP-TO-CEOS-3
   neighbor 10.0.14.2 remote-as 65001
   neighbor 10.0.14.2 description eBGP-TO-EDGE
!
management api http-commands
   protocol https
   no shutdown
!
end