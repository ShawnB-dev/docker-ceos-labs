!
hostname ceos-3
!
interface Loopback0
   ip address 3.3.3.3/32
!
interface Management1
   ip address 10.99.0.13/24
!
interface Ethernet1
   description TO-CEOS-2
   no switchport
   ip address 10.0.23.2/30
!
interface Ethernet2
   description TO-CEOS-1
   no switchport
   ip address 10.0.31.1/30
!
ip routing
!
router ospf 1
   router-id 3.3.3.3
   network 3.3.3.3/32 area 0
   network 10.0.23.0/30 area 0
   network 10.0.31.0/30 area 0
!
router bgp 65000
   router-id 3.3.3.3
   neighbor 1.1.1.1 remote-as 65000
   neighbor 1.1.1.1 update-source Loopback0
   neighbor 1.1.1.1 description iBGP-TO-CEOS-1
   neighbor 2.2.2.2 remote-as 65000
   neighbor 2.2.2.2 update-source Loopback0
   neighbor 2.2.2.2 description iBGP-TO-CEOS-2
!
management api http-commands
   protocol https
   no shutdown
!
end