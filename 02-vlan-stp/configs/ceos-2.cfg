!
hostname ceos-2
!
spanning-tree mode rapid-pvst
!
vlan 10
   name USERS
!
vlan 20
   name TOOLS
!
interface Management1
   ip address 10.99.0.12/24
!
interface Ethernet1
   description TRUNK-TO-CEOS-1
   switchport mode trunk
   switchport trunk allowed vlan 10,20
!
interface Ethernet2
   description host-a
   switchport access vlan 10
!
interface Ethernet3
   description host-b
   switchport access vlan 10
!
interface Ethernet4
   description rust-toolkit
   switchport access vlan 20
!
management api http-commands
   protocol https
   no shutdown
!
end