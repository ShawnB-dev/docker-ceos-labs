@version: 3.30
@include "scl/system/syslog.conf" # Include default system configurations if needed

# Source for network devices (UDP)
# Listens on all interfaces (0.0.0.0) on UDP port 514
source s_net {
    network(ip(0.0.0.0) port(514) transport(udp));
};

# Destination for remote logs
# Logs will be written to /var/log/syslog/remote-logs.log
destination d_remote_logs {
    file(
        "/var/log/syslog/remote-logs.log"
        template("${ISODATE} ${HOST} ${MSGHDR}${MSG}\n")
        template-escape(no)
    );
};

# Log path: Route messages from s_net to d_remote_logs
log {
    source(s_net);
    destination(d_remote_logs);
};