hostname spine-1
!
service routing protocols model multi-agent
!
ip routing
!
username admin privilege 15 role network-admin secret ceos
!
management api http-rpc
   protocol https
   no shutdown
!
interface Management0
   description Management
   ip address 10.99.0.11/24
!
interface Loopback0
   description EVPN_PEERING_SOURCE
   ip address 10.255.0.1/32
!
interface Ethernet1
   description TO_LEAF_1
   no switchport
   ip address 10.0.1.0/31
!
interface Ethernet5
   description TO_WAN_EDGE
   no switchport
   ip address 172.16.0.0/31
!
router ospf 1
   router-id 10.255.0.1
   passive-interface Loopback0
   network 0.0.0.0/0 area 0
!
router bgp 65000
   router-id 10.255.0.1
   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS remote-as 65000
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS route-reflector-client
   neighbor 10.255.1.1 peer group EVPN-OVERLAY-PEERS
   !
   address-family evpn
      neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv4
      neighbor EVPN-OVERLAY-PEERS next-hop unchanged