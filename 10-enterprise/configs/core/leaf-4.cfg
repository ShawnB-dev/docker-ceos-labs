!
hostname leaf-4
!
aaa authentication login default local
aaa authorization exec default local
!
username admin privilege 15 role network-admin secret admin
!
vlan 10
   name USERS
!
vlan 20
   name TOOLS
!
ip access-list mgmt-acl
   10 permit tcp host 10.99.0.50 any eq ssh
   20 permit tcp host 10.99.0.50 any eq https
   30 deny ip any any log
!
ip access-list iACL
   10 permit icmp any any
   20 permit tcp any any established
   30 deny ip 10.99.0.0/24 any
   40 permit ip any any
!
interface Loopback0
   ip address 10.255.1.4/32
!
interface Loopback1
   description VTEP
   ip address 10.255.100.4/32
!
interface Management1
   ip address 10.99.0.24/24
   ip access-group iACL in
!
interface Ethernet1
   description TO-SPINE1
   no switchport
   ip address 10.0.4.1/31
!
interface Ethernet2
   description TO-SPINE2
   no switchport
   ip address 10.0.4.3/31
!
interface Vlan10
   ip address virtual 192.168.10.1/24
!
interface Vlan20
   ip address virtual 192.168.20.1/24
!
interface vxlan1
   vxlan source-interface Loopback1
   vxlan virtual-router mac-address 00:1c:73:00:00:99
   vxlan vlan 10 vni 10010
   vxlan vlan 20 vni 10020
!
ip virtual-router mac-address 00:1c:73:00:00:99
ip routing
!
router ospf 1
   router-id 10.255.1.4
   passive-interface Loopback0
   network 10.0.0.0/8 area 0
   network 10.255.1.4/32 area 0
!
router bgp 65104
   router-id 10.255.1.4
   neighbor EVPN-OVERLAY peer group
   neighbor EVPN-OVERLAY update-source Loopback0
   neighbor EVPN-OVERLAY ebgp-multihop 3
   neighbor EVPN-OVERLAY send-community extended
   neighbor 10.255.0.1 peer group EVPN-OVERLAY
   neighbor 10.255.0.1 remote-as 65000
   neighbor 10.255.0.2 peer group EVPN-OVERLAY
   neighbor 10.255.0.2 remote-as 65000
   address-family evpn
      neighbor EVPN-OVERLAY activate
!
management ssh
   access-list mgmt-acl
   idle-timeout 15
!
management api http-commands
   protocol https
   no shutdown
   access-list mgmt-acl
!
banner login
Authorized Access Only. All activities are monitored.
!
logging host 10.99.0.50
!
end