!
hostname spine-2
!
aaa authentication login default local
aaa authorization exec default local
!
username admin privilege 15 role network-admin secret admin
!
ip access-list mgmt-acl
   10 permit tcp host 10.99.0.50 any eq ssh
   20 permit tcp host 10.99.0.50 any eq https
   30 deny ip any any log
!
ip access-list iACL
   10 permit icmp any any
   20 permit tcp any any established
   30 deny ip 10.99.0.0/24 any
   40 permit ip any any
!
interface Loopback0
   ip address 10.255.0.2/32
!
interface Management1
   ip address 10.99.0.12/24
   ip access-group iACL in
!
interface Ethernet1
   description TO-LEAF1
   no switchport
   ip address 10.0.1.2/31
!
interface Ethernet2
   description TO-LEAF2
   no switchport
   ip address 10.0.2.2/31
!
interface Ethernet3
   description TO-LEAF3
   no switchport
   ip address 10.0.3.2/31
!
interface Ethernet4
   description TO-LEAF4
   no switchport
   ip address 10.0.4.2/31
!
ip routing
!
router ospf 1
   router-id 10.255.0.2
   passive-interface Loopback0
   network 10.0.1.2/31 area 0
   network 10.0.2.2/31 area 0
   network 10.0.3.2/31 area 0
   network 10.0.4.2/31 area 0
   network 10.255.0.2/32 area 0
!
router bgp 65000
   router-id 10.255.0.2
   neighbor EVPN-OVERLAY peer group
   neighbor EVPN-OVERLAY next-hop-unchanged
   neighbor EVPN-OVERLAY update-source Loopback0
   neighbor EVPN-OVERLAY ebgp-multihop 3
   neighbor EVPN-OVERLAY send-community extended
   neighbor 10.255.1.1 peer group EVPN-OVERLAY
   neighbor 10.255.1.1 remote-as 65101
   neighbor 10.255.1.2 peer group EVPN-OVERLAY
   neighbor 10.255.1.2 remote-as 65102
   neighbor 10.255.1.3 peer group EVPN-OVERLAY
   neighbor 10.255.1.3 remote-as 65103
   neighbor 10.255.1.4 peer group EVPN-OVERLAY
   neighbor 10.255.1.4 remote-as 65104
   address-family evpn
      neighbor EVPN-OVERLAY activate
!
management ssh
   access-list mgmt-acl
   idle-timeout 15
!
management api http-commands
   protocol https
   no shutdown
   access-list mgmt-acl
!
banner login
Authorized Access Only. All activities are monitored.
!
logging host 10.99.0.50
!
end