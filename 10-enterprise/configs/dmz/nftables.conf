#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    # Network Definitions
    define NET_LAN = 172.16.100.0/24
    define NET_DMZ_SERVERS = { 172.16.101.0/24, 172.16.102.0/24 }
    define NET_MGMT = 10.99.0.0/24
    define HOST_RUST = 10.99.0.50

    chain input {
        type filter hook input priority 0; policy drop;

        # Stateful tracking for traffic destined for the firewall itself
        ct state established,related accept

        # Allow loopback interface traffic
        iif "lo" accept

        # Allow ICMP (Ping) for diagnostics
        icmp type echo-request accept

        # Management: Allow SSH and eAPI from the authorized Rust automation host
        ip saddr $HOST_RUST tcp dport { 22, 443 } accept

        # Routing Protocols: Allow FRR BGP and OSPF peering traffic
        tcp dport 179 accept
        ip protocol ospf accept
        ip daddr { 224.0.0.5, 224.0.0.6 } accept
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        # Stateful tracking for transit traffic
        ct state established,related accept

        # 1. Internal LAN to Everywhere: Permit all outbound initiated traffic
        ip saddr $NET_LAN accept

        # 2. Inbound Services: Permit HTTP and HTTPS traffic to DMZ servers
        ip daddr $NET_DMZ_SERVERS tcp dport { 80, 443 } accept

        # 3. DMZ Outbound: Permit DMZ servers to reach the WAN (e.g., for updates)
        ip saddr $NET_DMZ_SERVERS accept

        # 4. Isolation: Explicitly deny DMZ initiated traffic to the Internal LAN
        ip saddr $NET_DMZ_SERVERS ip daddr $NET_LAN drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}