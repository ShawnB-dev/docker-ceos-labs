!
hostname frr-fw
!
log file /var/log/frr/frr.log
!
interface eth0
 description Management Interface
!
interface eth1
 description DMZ Transit Network
!
interface eth2
 description WAN Interface
!
interface eth3
 description Internal LAN Interface
!
interface eth4
 description DMZ Server Network 1
!
interface eth5
 description DMZ Server Network 2
!
ip forwarding
!
! Static default route to the WAN gateway
ip route 0.0.0.0/0 203.0.113.254
!
! BGP configuration to peer with wan-edge and advertise internal networks
router bgp 65002
   router-id 192.168.254.2
   ! Peer with wan-edge (203.0.113.1) which is in AS 65000
   neighbor 203.0.113.1 remote-as 65000
   !
   address-family ipv4 unicast
      neighbor 203.0.113.1 activate
      ! Advertise internal LAN and DMZ server subnets
      network 172.16.100.0/24
      network 172.16.101.0/24
      network 172.16.102.0/24
   exit-address-family
!
line vty
!
end