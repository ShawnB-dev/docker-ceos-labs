!
hostname dist-1
!
aaa authentication login default local
aaa authorization exec default local
!
username admin privilege 15 role network-admin secret admin
!
vlan 10
   name USERS
!
vlan 20
   name TOOLS
!
vlan 4094
   name MLAG_PEER
   trunk group MLAG_PEER
!
ip access-list mgmt-acl
   10 permit tcp host 10.99.0.50 any eq ssh
   20 permit tcp host 10.99.0.50 any eq https
   30 deny ip any any log
!
ip access-list iACL
   10 permit icmp any any
   20 permit tcp any any established
   30 deny ip 10.99.0.0/24 any
   40 permit ip any any
!
interface Port-Channel1
   description MLAG_PEER_LINK
   switchport mode trunk
   switchport trunk group MLAG_PEER
!
interface Ethernet1
   description MLAG_PEER_L1
   channel-group 1 mode active
!
interface Ethernet2
   description MLAG_PEER_L2
   channel-group 1 mode active
!
interface Ethernet3
   description TO-LEAF-1
   switchport mode trunk
!
interface Ethernet4
   description TO-LEAF-2
   switchport mode trunk
!
interface Ethernet5
   description TO-ACCESS-1
   switchport mode trunk
   mlag 10
!
interface Management1
   ip address 10.99.0.31/24
   ip access-group iACL in
!
interface Vlan4094
   description MLAG_PEERING
   ip address 172.16.255.1/30
!
mlag configuration
   domain-id DIST_MLAG
   local-interface Vlan4094
   peer-address 172.16.255.2
   peer-link Port-Channel1
!
ip routing
!
management ssh
   access-list mgmt-acl
   idle-timeout 15
!
management api http-commands
   protocol https
   no shutdown
   access-list mgmt-acl
!
banner login
Authorized Access Only. All activities are monitored.
!
logging host 10.99.0.50
!
end