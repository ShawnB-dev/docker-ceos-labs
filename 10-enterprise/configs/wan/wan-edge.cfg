hostname wan-edge
!
service routing protocols model multi-agent
!
ip routing
!
username admin privilege 15 role network-admin secret ceos
!
management api http-rpc
   protocol https
   no shutdown
!
interface Management0
   description Management
   ip address 10.99.0.30/24
!
interface Ethernet1
   description TO_CORE_FABRIC
   no switchport
   ip address 172.16.0.1/31
!
interface Ethernet2
   description TO_WAN_NET
   no switchport
   ip address 203.0.113.1/24
!
interface Ethernet3
   description TO_FIREWALL
   no switchport
   ip address 172.16.0.3/31
!
router bgp 65000
   router-id 10.255.255.1
   neighbor 172.16.0.2 remote-as 65000
   neighbor 172.16.0.2 description FIREWALL
   neighbor 203.0.113.11 remote-as 65001
   neighbor 203.0.113.11 description BRANCH-1
   neighbor 203.0.113.12 remote-as 65002
   neighbor 203.0.113.12 description BRANCH-2
   !
   address-family ipv4
      neighbor 172.16.0.2 activate
      neighbor 203.0.113.11 activate
      neighbor 203.0.113.12 activate
      network 0.0.0.0/0
      redistribute connected
!
ip route 0.0.0.0/0 203.0.113.254