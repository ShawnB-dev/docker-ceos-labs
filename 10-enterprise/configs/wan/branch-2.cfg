hostname branch-2
!
service routing protocols model multi-agent
!
ip routing
!
username admin privilege 15 role network-admin secret ceos
!
management api http-rpc
   protocol https
   no shutdown
!
interface Management0
   description Management
   ip address 10.99.0.32/24
!
interface Ethernet1
   description TO_WAN_EDGE
   no switchport
   ip address 203.0.113.12/24
!
interface Ethernet2
   description BRANCH_2_LAN
   no switchport
   ip address 192.168.102.1/24
!
router bgp 65002
   router-id 10.255.255.12
   neighbor 203.0.113.1 remote-as 65000
   neighbor 203.0.113.1 description WAN-EDGE
   !
   address-family ipv4
      neighbor 203.0.113.1 activate
      network 192.168.102.0/24
      redistribute connected
!
ip route 0.0.0.0/0 203.0.113.1