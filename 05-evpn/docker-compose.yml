x-ceos-base: &ceos-base
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 1G
      reservations:
        memory: 512M

services:
  spine-1:
    <<: *ceos-base
    image: ceos:4.36.0.1F
    container_name: spine-1
    privileged: true
    environment:
      - CEOS=1
      - EOS_PLATFORM=ceoslab
      - MGMT_INTF=Management1
      - INTFTYPE=eth
      - SKIP_ZEROTOUCH_BYPASS=1
      - EOS_CONFIG_FILE=/mnt/flash/spine-1.cfg
    volumes:
      - ./configs:/mnt/flash
    networks:
      mgmt-net:
        ipv4_address: 10.99.0.11
      p2p-1-1:
      p2p-1-2:
    healthcheck:
      test: ["CMD", "sh", "-c", "kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  spine-2:
    <<: *ceos-base
    image: ceos:4.36.0.1F
    container_name: spine-2
    privileged: true
    environment:
      - CEOS=1
      - EOS_PLATFORM=ceoslab
      - MGMT_INTF=Management1
      - INTFTYPE=eth
      - SKIP_ZEROTOUCH_BYPASS=1
      - EOS_CONFIG_FILE=/mnt/flash/spine-2.cfg
    volumes:
      - ./configs:/mnt/flash
    networks:
      mgmt-net:
        ipv4_address: 10.99.0.12
      p2p-2-1:
      p2p-2-2:
    healthcheck:
      test: ["CMD", "sh", "-c", "kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  leaf-1:
    <<: *ceos-base
    image: ceos:4.36.0.1F
    container_name: leaf-1
    privileged: true
    environment:
      - CEOS=1
      - EOS_PLATFORM=ceoslab
      - MGMT_INTF=Management1
      - INTFTYPE=eth
      - SKIP_ZEROTOUCH_BYPASS=1
      - EOS_CONFIG_FILE=/mnt/flash/leaf-1.cfg
    volumes:
      - ./configs:/mnt/flash
    networks:
      mgmt-net:
        ipv4_address: 10.99.0.21
      p2p-1-1:
      p2p-2-1:
      host-net-1a:
      host-net-1t:
    healthcheck:
      test: ["CMD", "sh", "-c", "kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  leaf-2:
    <<: *ceos-base
    image: ceos:4.36.0.1F
    container_name: leaf-2
    privileged: true
    environment:
      - CEOS=1
      - EOS_PLATFORM=ceoslab
      - MGMT_INTF=Management1
      - INTFTYPE=eth
      - SKIP_ZEROTOUCH_BYPASS=1
      - EOS_CONFIG_FILE=/mnt/flash/leaf-2.cfg
    volumes:
      - ./configs:/mnt/flash
    networks:
      mgmt-net:
        ipv4_address: 10.99.0.22
      p2p-1-2:
      p2p-2-2:
      host-net-2:
    healthcheck:
      test: ["CMD", "sh", "-c", "kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  host-a:
    image: alpine:latest
    container_name: host-a
    command: sh -c "ip addr add 192.168.10.10/24 dev eth0 && ip route add default via 192.168.10.1 && sleep infinity"
    networks:
      host-net-1a:

  host-b:
    image: alpine:latest
    container_name: host-b
    command: sh -c "ip addr add 192.168.10.11/24 dev eth0 && ip route add default via 192.168.10.1 && sleep infinity"
    networks:
      host-net-2:

  rust-toolkit:
    image: rust:latest
    container_name: rust-toolkit
    working_dir: /tools
    volumes:
      - ../rust-toolkit:/tools
    command: sh -c "ip addr add 192.168.20.10/24 dev eth1 && ip route add default via 192.168.20.1 && sleep infinity"
    networks:
      mgmt-net:
        ipv4_address: 10.99.0.50
      host-net-1t:

networks:
  mgmt-net: { driver: bridge, ipam: { config: [ { subnet: 10.99.0.0/24 } ] } }
  p2p-1-1: { driver: bridge, ipam: { config: [ { subnet: 10.0.1.0/31 } ] } }
  p2p-1-2: { driver: bridge, ipam: { config: [ { subnet: 10.0.2.0/31 } ] } }
  p2p-2-1: { driver: bridge, ipam: { config: [ { subnet: 10.0.1.2/31 } ] } }
  p2p-2-2: { driver: bridge, ipam: { config: [ { subnet: 10.0.2.2/31 } ] } }
  host-net-1a: { driver: bridge }
  host-net-1t: { driver: bridge }
  host-net-2: { driver: bridge }